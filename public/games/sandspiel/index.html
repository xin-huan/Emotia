<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>沙粒模拟</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; flex-direction: column; align-items: center;
  background: #1a1a2e; height: 100vh; overflow: hidden;
  font-family: system-ui, sans-serif;
}
.toolbar {
  display: flex; gap: 8px; padding: 10px; flex-wrap: wrap; justify-content: center;
  background: #16213e; width: 100%; z-index: 2;
}
.btn {
  padding: 8px 16px; border: 2px solid transparent; border-radius: 20px;
  cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s;
  color: #fff; background: #0f3460;
}
.btn:hover { background: #1a4a7a; }
.btn.active { border-color: #e94560; background: #1a4a7a; box-shadow: 0 0 12px rgba(233,69,96,0.4); }
.btn.clear { background: #e94560; }
.btn.clear:hover { background: #d63851; }
canvas { flex: 1; width: 100%; cursor: crosshair; touch-action: none; }
.info { color: #888; font-size: 12px; padding: 6px; text-align: center; }
</style>
</head>
<body>
<div class="toolbar">
  <button class="btn active" data-type="sand">🟡 沙子</button>
  <button class="btn" data-type="water">🔵 水</button>
  <button class="btn" data-type="fire">🔥 火</button>
  <button class="btn" data-type="plant">🟢 植物</button>
  <button class="btn" data-type="wall">⬜ 墙</button>
  <button class="btn" data-type="salt">⚪ 盐</button>
  <button class="btn" data-type="lava">🟠 岩浆</button>
  <button class="btn clear" data-type="clear">🗑️ 清除</button>
</div>
<canvas id="canvas"></canvas>
<div class="info">点击或拖拽放置粒子 | 使用滚轮调整画笔大小</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const COLS = 160;
let ROWS;
const cellSize = 4;
let grid, nextGrid;
let brushSize = 4;
let currentType = 'sand';
let mouseDown = false;

const COLORS = {
  empty: '#1a1a2e',
  sand: '#e6c873',
  water: '#4a9eda',
  fire: '#ff6b3d',
  plant: '#5dab4a',
  wall: '#8a8a8a',
  salt: '#f0f0f0',
  lava: '#ff8c42'
};

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 80;
  ROWS = Math.floor(canvas.height / cellSize);
  initGrid();
}

function initGrid() {
  grid = new Array(COLS);
  nextGrid = new Array(COLS);
  for (let x = 0; x < COLS; x++) {
    grid[x] = new Array(ROWS).fill('empty');
    nextGrid[x] = new Array(ROWS).fill('empty');
  }
}

function updateSand(x, y) {
  if (y >= ROWS - 1) return;
  if (grid[x][y + 1] === 'empty') {
    nextGrid[x][y + 1] = 'sand';
    nextGrid[x][y] = 'empty';
    return;
  }
  const dirs = Math.random() < 0.5 ? [-1, 1] : [1, -1];
  for (const dx of dirs) {
    const nx = x + dx;
    if (nx >= 0 && nx < COLS && y + 1 < ROWS && grid[nx][y + 1] === 'empty') {
      nextGrid[nx][y + 1] = 'sand';
      nextGrid[x][y] = 'empty';
      return;
    }
  }
}

function updateWater(x, y) {
  if (y >= ROWS - 1) return;
  if (grid[x][y + 1] === 'empty') {
    nextGrid[x][y + 1] = 'water';
    nextGrid[x][y] = 'empty';
    return;
  }
  const dirs = Math.random() < 0.5 ? [-1, 1] : [1, -1];
  for (const dx of dirs) {
    const nx = x + dx;
    if (nx >= 0 && nx < COLS && y + 1 < ROWS && grid[nx][y + 1] === 'empty') {
      nextGrid[nx][y + 1] = 'water';
      nextGrid[x][y] = 'empty';
      return;
    }
  }
  const spreadDirs = Math.random() < 0.5 ? [-1, 1] : [1, -1];
  for (const dx of spreadDirs) {
    const nx = x + dx;
    if (nx >= 0 && nx < COLS && grid[nx][y] === 'empty') {
      nextGrid[nx][y] = 'water';
      nextGrid[x][y] = 'empty';
      return;
    }
  }
}

function updateFire(x, y) {
  const life = Math.random();
  if (life < 0.05) { nextGrid[x][y] = 'empty'; return; }
  if (life < 0.3 && y > 0) {
    const dy = -1;
    if (grid[x][y + dy] !== 'fire') nextGrid[x][y + dy] = 'empty';
  }
  if (life < 0.5) {
    const dx = Math.random() < 0.5 ? -1 : 1;
    const nx = x + dx;
    if (nx >= 0 && nx < COLS && y > 0 && grid[nx][y - 1] === 'empty') {
      nextGrid[nx][y - 1] = 'fire';
      nextGrid[x][y] = 'empty';
      return;
    }
  }
  // Burn plants
  for (const dx of [-1, 0, 1]) {
    for (const dy of [-1, 0, 1]) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && grid[nx][ny] === 'plant') {
        nextGrid[nx][ny] = 'fire';
      }
    }
  }
  // Water kills fire
  for (const dx of [-1, 0, 1]) {
    for (const dy of [-1, 0, 1]) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && grid[nx][ny] === 'water') {
        nextGrid[x][y] = 'empty'; return;
      }
    }
  }
}

function updateLava(x, y) {
  updateSand(x, y);
  if (nextGrid[x][y] === 'lava') {
    for (const dx of [-1, 0, 1]) {
      for (const dy of [-1, 0, 1]) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && grid[nx][ny] === 'water') {
          nextGrid[nx][ny] = 'wall'; nextGrid[x][y] = 'wall'; return;
        }
        if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && grid[nx][ny] === 'plant') {
          nextGrid[nx][ny] = 'fire';
        }
      }
    }
  }
}

function updatePlant(x, y) {
  if (Math.random() < 0.01) {
    const dx = Math.floor(Math.random() * 3) - 1;
    const dy = Math.floor(Math.random() * 3) - 1;
    const nx = x + dx, ny = y + dy;
    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && grid[nx][ny] === 'empty' && ny >= y) {
      nextGrid[nx][ny] = 'plant';
    }
  }
  // Plant dies next to lava
  for (const dx of [-1, 0, 1]) {
    for (const dy of [-1, 0, 1]) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && (grid[nx][ny] === 'lava' || grid[nx][ny] === 'fire')) {
        nextGrid[x][y] = 'empty'; return;
      }
    }
  }
  // Plant spreads on water nearby
  for (const dx of [-1, 0, 1]) {
    for (const dy of [-1, 0, 1]) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && grid[nx][ny] === 'water' && Math.random() < 0.1) {
        nextGrid[nx][ny] = 'plant';
      }
    }
  }
}

function update() {
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++)
      nextGrid[x][y] = grid[x][y];

  // Process bottom-up for gravity
  for (let y = ROWS - 1; y >= 0; y--) {
    for (let x = 0; x < COLS; x++) {
      const cell = grid[x][y];
      if (cell === 'empty' || cell === 'wall') continue;
      if (nextGrid[x][y] !== cell) continue;

      switch (cell) {
        case 'sand': updateSand(x, y); break;
        case 'water': updateWater(x, y); break;
        case 'fire': updateFire(x, y); break;
        case 'plant': updatePlant(x, y); break;
        case 'lava': updateLava(x, y); break;
        case 'salt':
          if (y < ROWS - 1 && grid[x][y + 1] === 'water') { nextGrid[x][y] = 'empty'; }
          else if (y < ROWS - 1 && grid[x][y + 1] === 'empty') { nextGrid[x][y + 1] = 'salt'; nextGrid[x][y] = 'empty'; }
          break;
      }
    }
  }

  [grid, nextGrid] = [nextGrid, grid];
}

function draw() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const imageData = ctx.createImageData(canvas.width, canvas.height);
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      if (grid[x][y] === 'empty') continue;
      const color = COLORS[grid[x][y]] || '#fff';
      const r = parseInt(color.slice(1, 3), 16);
      const g = parseInt(color.slice(3, 5), 16);
      const b = parseInt(color.slice(5, 7), 16);
      for (let dy = 0; dy < cellSize; dy++) {
        for (let dx = 0; dx < cellSize; dx++) {
          const px = x * cellSize + dx;
          const py = y * cellSize + dy;
          if (px >= canvas.width || py >= canvas.height) continue;
          const idx = (py * canvas.width + px) * 4;
          imageData.data[idx] = r;
          imageData.data[idx + 1] = g;
          imageData.data[idx + 2] = b;
          imageData.data[idx + 3] = 255;
        }
      }
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

function placeParticles(mx, my) {
  const startX = Math.floor(mx / cellSize) - Math.floor(brushSize / 2);
  const startY = Math.floor(my / cellSize) - Math.floor(brushSize / 2);
  for (let dx = 0; dx < brushSize; dx++) {
    for (let dy = 0; dy < brushSize; dy++) {
      const x = startX + dx, y = startY + dy;
      if (x >= 0 && x < COLS && y >= 0 && y < ROWS) {
        if (grid[x][y] === 'empty') grid[x][y] = currentType;
      }
    }
  }
}

function clearAll() {
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++)
      grid[x][y] = 'empty';
}

// Mouse
canvas.addEventListener('mousedown', e => {
  if (e.button === 0) { mouseDown = true; placeParticles(e.offsetX, e.offsetY); }
  if (e.button === 2) { clearAll(); }
});
canvas.addEventListener('mousemove', e => {
  if (mouseDown) placeParticles(e.offsetX, e.offsetY);
});
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('mouseleave', () => mouseDown = false);
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  mouseDown = true;
  for (const touch of e.touches) {
    placeParticles(touch.clientX, touch.clientY - 80);
  }
}, {passive: false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const touch of e.touches) {
    placeParticles(touch.clientX, touch.clientY - 80);
  }
}, {passive: false});
canvas.addEventListener('touchend', () => mouseDown = false);

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  brushSize = Math.max(1, Math.min(12, brushSize + (e.deltaY > 0 ? -1 : 1)));
}, {passive: false});

// Toolbar
document.querySelectorAll('.btn[data-type]').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.type;
    if (type === 'clear') { clearAll(); return; }
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentType = type;
  });
});

resize();
window.addEventListener('resize', resize);

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
